name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check SDK
        run: npx tsc --noEmit -p sdk/tsconfig.json

      - name: Type check scripts
        run: npx tsc --noEmit -p scripts/tsconfig.json

  test-contracts:
    name: Test Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: '2.15.1'

      - name: Install starknet-foundry
        run: |
          curl -L https://raw.githubusercontent.com/foundry-rs/starknet-foundry/master/scripts/install.sh | sh -s -- -v 0.55.0
          echo "$HOME/.local/share/starknet-foundry/bin" >> $GITHUB_PATH

      - name: Cache Scarb target
        uses: actions/cache@v4
        with:
          path: contracts/target
          key: scarb-target-${{ hashFiles('contracts/Scarb.lock') }}
          restore-keys: scarb-target-

      - name: Build contracts
        run: scarb build
        working-directory: contracts

      - name: Test contracts
        run: snforge test
        working-directory: contracts

  test-circuits:
    name: Test Circuits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install snarkjs
        run: npm install -g snarkjs

      - name: Check snarkjs available
        run: snarkjs --help || true

  test-sdk:
    name: Test SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test SDK
        run: npm test
        working-directory: sdk
