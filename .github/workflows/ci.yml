name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check SDK
        run: npx tsc --noEmit -p sdk/tsconfig.json

      - name: Type check scripts
        run: npx tsc --noEmit -p scripts/tsconfig.json

  test-contracts:
    name: Test Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: '2.15.1'

      - name: Install starknet-foundry
        run: |
          VERSION="0.55.0"
          ARCHIVE="starknet-foundry-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -L "https://github.com/foundry-rs/starknet-foundry/releases/download/v${VERSION}/${ARCHIVE}" -o snfoundry.tar.gz
          tar -xzf snfoundry.tar.gz
          find . -name "snforge" -type f | head -1 | xargs -I{} sudo mv {} /usr/local/bin/snforge
          find . -name "sncast" -type f | head -1 | xargs -I{} sudo mv {} /usr/local/bin/sncast
          snforge --version

      - name: Install universal-sierra-compiler
        run: |
          USC_VERSION="v2.7.0"
          curl -L "https://github.com/software-mansion/universal-sierra-compiler/releases/download/${USC_VERSION}/universal-sierra-compiler-${USC_VERSION}-x86_64-unknown-linux-musl.tar.gz" -o usc.tar.gz
          tar -xzf usc.tar.gz
          find . -name "universal-sierra-compiler" -type f | head -1 | xargs -I{} sudo mv {} /usr/local/bin/universal-sierra-compiler
          universal-sierra-compiler --version

      - name: Cache Scarb target
        uses: actions/cache@v4
        with:
          path: contracts/target
          key: scarb-target-${{ hashFiles('contracts/Scarb.lock') }}
          restore-keys: scarb-target-

      - name: Build contracts
        run: scarb build
        working-directory: contracts

      - name: Test contracts
        run: snforge test
        working-directory: contracts

  test-circuits:
    name: Test Circuits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install snarkjs
        run: npm install -g snarkjs

      - name: Check snarkjs available
        run: snarkjs --help || true

  test-sdk:
    name: Test SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test SDK
        run: npm test
        working-directory: sdk
